<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente dourado metálico -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FFB700;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra suave -->
    <filter id="shadow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fundo preto -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Quadrado com cantos muito arredondados (squircle) -->
  <rect x="64" y="64" width="384" height="384" rx="80" ry="80" 
        fill="none" 
        stroke="url(#goldGradient)" 
        stroke-width="28"
        filter="url(#shadow)"/>
  
  <!-- Letra V estilizada -->
  <g filter="url(#shadow)">
    <!-- Traço esquerdo do V (linha reta que angula levemente) -->
    <path d="M 180 140 L 180 260 L 220 300" 
          stroke="url(#goldGradient)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- Traço direito do V (com curva suave no final) -->
    <path d="M 332 140 L 300 260 Q 300 285 320 300" 
          stroke="url(#goldGradient)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
</svg>

